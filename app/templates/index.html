<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédiction Churn — E-commerce</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .hint {
            color: #7f8c8d;
            font-size: 12px;
            font-weight: normal;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover { background: #2980b9; }

        /* Résultat */
        .result {
            margin-top: 32px;
            padding: 24px;
            border-radius: 10px;
            text-align: center;
        }

        .result.churn {
            background: #fdf0f0;
            border: 2px solid #e74c3c;
        }

        .result.fidele {
            background: #f0fdf4;
            border: 2px solid #27ae60;
        }

        .result-label {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .result.churn .result-label { color: #e74c3c; }
        .result.fidele .result-label { color: #27ae60; }

        .probas {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 16px 0;
        }

        .proba-box {
            background: white;
            border-radius: 8px;
            padding: 12px 20px;
            min-width: 130px;
        }

        .proba-box .val {
            font-size: 24px;
            font-weight: bold;
        }

        .proba-box .lbl {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 2px;
        }

        .segment-box {
            background: white;
            border-radius: 8px;
            padding: 10px 16px;
            display: inline-block;
            margin-top: 8px;
            font-size: 14px;
            color: #555;
            border: 1px solid #e0e0e0;
        }

        .error {
            margin-top: 20px;
            padding: 14px;
            background: #fdf0f0;
            border: 1px solid #e74c3c;
            border-radius: 8px;
            color: #e74c3c;
            font-size: 14px;
        }

        .divider {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 28px 0;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>🛒 Prédiction Churn Client</h1>
    <p class="subtitle">E-commerce de cadeaux — Analyse comportementale</p>

    <form action="/predict" method="POST">

        <div class="form-group">
            <label>
                Recency
                <span class="hint">— jours depuis le dernier achat (0-400)</span>
            </label>
            <input type="number" name="recency" min="0" max="400"
                   value="{{ recency if recency else 50 }}" required>
        </div>

        <div class="form-group">
            <label>
                Frequency
                <span class="hint">— nombre de commandes (1-50)</span>
            </label>
            <input type="number" name="frequency" min="1" max="50"
                   value="{{ frequency if frequency else 5 }}" required>
        </div>

        <div class="form-group">
            <label>
                Monetary Total
                <span class="hint">— total dépensé en £ (0-15000)</span>
            </label>
            <input type="number" name="monetary" min="0" max="15000" step="0.01"
                   value="{{ monetary if monetary else 500 }}" required>
        </div>

        <div class="form-group">
            <label>
                Âge
                <span class="hint">— âge estimé du client (18-81)</span>
            </label>
            <input type="number" name="age" min="18" max="81"
                   value="{{ age if age else 40 }}" required>
        </div>

        <div class="form-group">
            <label>
                Customer Tenure
                <span class="hint">— durée relation client en jours (0-730)</span>
            </label>
            <input type="number" name="tenure" min="0" max="730"
                   value="{{ tenure if tenure else 365 }}" required>
        </div>

        <button type="submit">🔍 Prédire</button>
    </form>

    <!-- Erreur -->
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Résultat -->
    {% if prediction %}
    <hr class="divider">
    <div class="result {{ 'churn' if 'Churner' in prediction else 'fidele' }}">

        <div class="result-label">{{ prediction }}</div>

        <div class="probas">
    <div class="proba-box">
        <div class="val" style="color:#e74c3c">{{ prob_churn }}%</div>
        <div class="lbl">Probabilité Churner</div>
    </div>
    <div class="proba-box">
        <div class="val" style="color:#27ae60">{{ prob_fidele }}%</div>
        <div class="lbl">Probabilité Fidèle</div>
    </div>
</div>

        <div class="segment-box">📊 {{ segment }}</div>

    </div>
    {% endif %}

</div>
</body>
</html>
